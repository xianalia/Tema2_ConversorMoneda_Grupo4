name: Corrección Automática de JUnit 5

on: [push, pull_request]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Copiar el código del alumno
      uses: actions/checkout@v4

    - name: Configurar Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    - name: Ejecutar pruebas de JUnit 5 con Maven
      run: mvn --batch-mode clean test